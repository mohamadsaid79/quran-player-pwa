<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="50%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF8F00" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#FFB300" stroke-width="4"/>

  <!-- Glowing Aura -->
  <circle cx="256" cy="256" r="180" fill="url(#glowGrad)" opacity="0.05" filter="url(#glow)"/>

  <!-- Golden Crescent Moon -->
  <path d="M 320,140 A 120,120 0 1,0 320,372 A 100,100 0 1,1 320,140 Z" fill="url(#goldGrad)" filter="url(#glow)"/>

  <!-- Sound Waves (incorporating Quran audio player concept) -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <!-- Wave lines -->
    <rect x="-80" y="-30" width="10" height="60" rx="5" fill="url(#goldGrad)"/>
    <rect x="-55" y="-50" width="10" height="100" rx="5" fill="url(#goldGrad)"/>
    <rect x="-30" y="-70" width="10" height="140" rx="5" fill="url(#goldGrad)"/>
    <rect x="-5" y="-90" width="10" height="180" rx="5" fill="url(#goldGrad)"/>
    <rect x="20" y="-60" width="10" height="120" rx="5" fill="url(#goldGrad)"/>
    <rect x="45" y="-40" width="10" height="80" rx="5" fill="url(#goldGrad)"/>
    <rect x="70" y="-20" width="10" height="40" rx="5" fill="url(#goldGrad)"/>
  </g>

  <!-- Golden Star -->
  <polygon points="310,210 315,225 330,225 318,235 322,250 310,240 298,250 302,235 290,225 305,225" fill="url(#goldGrad)" filter="url(#glow)"/>
</svg>
